name: Training

on:
  push:
    branches: [ runners ]

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - name: Inspect hardware
      run: |
        echo "=== CPU Info ==="
        lscpu
        echo ""
        echo "=== CPU Count ==="
        nproc
        echo ""
        echo "=== Memory ==="
        free -h
        echo ""
        echo "=== Disk Space ==="
        df -h
        echo ""
        echo "=== GPU Check ==="
        lspci | grep -i vga || echo "No VGA devices found"
        nvidia-smi 2>/dev/null || echo "No NVIDIA GPU available"
    
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y clang time libopenblas-dev
    
    - name: Download corpus
      run: |
        echo "Downloading corpus..."
        wget -q --show-progress --progress=dot:mega \
          "https://drive.usercontent.google.com/download?confirm=t&id=1staEGnDgzu6ViHFtGNMdhOkw_u_4Jntj" \
          -O - | gzip -d > corpus.txt
        echo "Corpus downloaded: $(du -h corpus.txt | cut -f1)"
    
    - name: Run training
      run: make run -j 4
    
    - name: Upload model
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: "*.bin"
        retention-days: 7