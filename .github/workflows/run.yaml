name: Training

on:
  push:
    branches: [ runners ]

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - name: Inspect hardware
      run: |
        echo "=== CPU Info ==="
        lscpu | grep -E "Model name|CPU\(s\)|Thread|Core"
        echo ""
        echo "=== Memory ==="
        free -h
        echo ""
        echo "=== Disk Space ==="
        df -h | grep -E "Filesystem|/dev/root"
    
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y clang time libopenblas-dev
    
    - name: Download corpus
      run: |
        echo "Downloading corpus..."
        wget -q --show-progress --progress=dot:mega \
          "https://drive.usercontent.google.com/download?confirm=t&id=1staEGnDgzu6ViHFtGNMdhOkw_u_4Jntj" \
          -O - | gzip -d > corpus.txt
        echo "Corpus downloaded: $(du -h corpus.txt | cut -f1)"
    
    - name: Build
      run: make -j$(nproc)
    
    - name: Run training
      run: |
        echo "Starting training..."
        stdbuf -oL ./train.out 2>&1 | tee training.log
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: training-artifacts
        path: |
          *.bin
          training.log
        retention-days: 7