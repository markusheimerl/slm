name: Train SLM Model

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-pod:
    runs-on: ubuntu-latest
    
    steps:
      - name: Create RunPod Instance
        id: create-pod
        run: |
          SCRIPT='
          #!/bin/bash
          set -e
          
          # Update and install packages
          cd /workspace
          apt-get update
          apt-get install -y time clang curl libcurl4-openssl-dev jq
          
          # Clone repo and prepare
          git clone https://github.com/${REPO_OWNER}/${REPO_NAME}.git
          cd ${REPO_NAME}
          
          # Prepare data and train
          make data
          make run
          make gen > generation_output.txt
          
          # Create artifacts
          mkdir -p artifacts
          cp *.bin artifacts/
          cp generation_output.txt artifacts/
          
          # Get content for GitHub release
          CONTENT=$(cat generation_output.txt)
          
          # Create GitHub release
          JSON="{\"tag_name\":\"slm-model-${RUN_NUMBER}\",\"name\":\"SLM Model ${RUN_NUMBER}\",\"body\":\"Training completed. Generated sample:\\n\\n\`\`\`\\n${CONTENT}\\n\`\`\`\"}"
          
          # Create the release
          RELEASE_RESPONSE=$(curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases" \
            -d "${JSON}")
          
          # Get release ID
          RELEASE_ID=$(echo "${RELEASE_RESPONSE}" | jq -r ".id")
          echo "Release created with ID: ${RELEASE_ID}"
          
          # Upload each artifact file
          for file in artifacts/*; do
            FILENAME=$(basename ${file})
            echo "Uploading ${FILENAME}..."
            curl -L -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases/${RELEASE_ID}/assets?name=${FILENAME}" \
              --data-binary @${file}
          done
          
          echo "Release process completed!"
          poweroff
          '
          
          # Create RunPod instance with the script as an init script
          QUERY="mutation { podFindAndDeployOnDemand(input: { cloudType: SECURE, gpuCount: 1, volumeInGb: 2, containerDiskInGb: 10, minVcpuCount: 4, minMemoryInGb: 30, gpuTypeId: \"NVIDIA RTX A4500\", name: \"slm-training\", imageName: \"runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04\", volumeMountPath: \"/workspace\", env: [{ key: \"GITHUB_TOKEN\", value: \"${{ secrets.GITHUB_TOKEN }}\" }, { key: \"REPO_OWNER\", value: \"${{ github.repository_owner }}\" }, { key: \"REPO_NAME\", value: \"${{ github.event.repository.name }}\" }, { key: \"RUN_NUMBER\", value: \"${{ github.run_number }}\" }], startupScript: \"$SCRIPT\" }) { id imageName machineId } }"
          
          RESPONSE=$(curl --request POST \
            --header 'content-type: application/json' \
            --url "https://api.runpod.io/graphql?api_key=${{ secrets.RUNPOD_API_KEY }}" \
            --data "{\"query\": \"$QUERY\"}")
          
          echo "Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "error"; then
            echo "Error creating pod"
            echo "$RESPONSE"
            exit 1
          fi
          
          POD_ID=$(echo "$RESPONSE" | jq -r '.data.podFindAndDeployOnDemand.id')
          if [[ -z "$POD_ID" || "$POD_ID" == "null" ]]; then
            echo "Failed to get pod ID from response"
            exit 1
          fi
          
          echo "Created pod with ID: $POD_ID"
          echo "pod_id=$POD_ID" >> $GITHUB_OUTPUT
          
          echo "Pod has been started and will complete training and release process independently."
          echo "Training with default epoch count and releasing as slm-model-${{ github.run_number }}."